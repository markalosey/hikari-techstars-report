# Deploy a completely static site from the repo root to GitHub Pages
name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact (site contents)
        uses: actions/upload-pages-artifact@v3
        with:
          # For a site at the repo root, keep path set to the repository root.
          # If your built output lives in another folder (e.g. ./public or ./docs),
          # change this value to that folder instead.
          path: './'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
